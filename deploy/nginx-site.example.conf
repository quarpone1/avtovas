# Пример виртуального хоста nginx.
# Скопируйте в sites-available, поправьте server_name и root, затем:
#   sudo ln -s .../sites-available/autovas .../sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Путь к папке, куда вы залили содержимое проекта (index.html, assets/, …)
    root /var/www/autovas;
    index index.html;

    charset utf-8;

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
